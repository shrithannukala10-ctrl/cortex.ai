<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menu Mind AI</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI';
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 15px;
  font-size: 26px;
  background: #020617;
}

.container {
  padding: 20px;
}

.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

button {
  padding: 8px;
  margin-top: 10px;
  border: none;
  border-radius: 5px;
  background: #22c55e;
  cursor: pointer;
  font-weight: bold;
}

.ai-box, .cart {
  margin-top: 20px;
  padding: 15px;
  background: #020617;
  border-radius: 10px;
}

</style>
</head>

<body>

<header>🍽️ Menu Mind AI</header>

<div class="container">

<h2>Menu</h2>
<div class="menu" id="menu"></div>

<div class="ai-box">
  <h2>🤖 AI Recommendation</h2>
  <p id="suggestion">Click below</p>
  <button onclick="recommend()">Recommend</button>
</div>

<div class="cart">
  <h2>🛒 Cart</h2>
  <ul id="cartList"></ul>
  <h3 id="total">Total: ₹0</h3>
  <button onclick="pay()">Pay Now</button>
</div>

</div>

<script>

// ===== DATABASE (can be replaced by backend later) =====
let foods = [
  {name: "Pizza", price: 200},
  {name: "Burger", price: 150},
  {name: "Pasta", price: 180},
  {name: "Biryani", price: 250}
];

// ===== STATE =====
let cart = [];
let total = 0;

// Load order history
let history = JSON.parse(localStorage.getItem("orders")) || [];

// ===== UI LOAD =====
function loadMenu() {
  let menuDiv = document.getElementById("menu");
  foods.forEach(f => {
    let div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `${f.name}<br>₹${f.price}<br>
      <button onclick="addToCart('${f.name}', ${f.price})">Add</button>`;
    menuDiv.appendChild(div);
  });
}

loadMenu();

// ===== CART =====
function addToCart(item, price) {
  cart.push({item, price});
  total += price;
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cartList");
  list.innerHTML = "";

  cart.forEach(c => {
    let li = document.createElement("li");
    li.innerText = c.item + " - ₹" + c.price;
    list.appendChild(li);
  });

  document.getElementById("total").innerText = "Total: ₹" + total;
}

// ===== AI LOGIC (ML READY) =====
function recommend() {

  let counts = {};

  // count past orders
  history.forEach(item => {
    counts[item] = (counts[item] || 0) + 1;
  });

  // time-based logic
  let hour = new Date().getHours();

  if (hour < 12) counts["Pasta"] = (counts["Pasta"] || 0) + 2;
  if (hour > 18) counts["Biryani"] = (counts["Biryani"] || 0) + 3;

  // find best item
  let best = null;
  let max = 0;

  for (let food in counts) {
    if (counts[food] > max) {
      max = counts[food];
      best = food;
    }
  }

  if (!best) best = foods[Math.floor(Math.random()*foods.length)].name;

  document.getElementById("suggestion").innerText =
    "AI suggests: " + best;
}

// ===== PAYMENT =====
function pay() {
  if (cart.length === 0) {
    alert("Cart empty!");
    return;
  }

  // Save order history
  cart.forEach(c => history.push(c.item));
  localStorage.setItem("orders", JSON.stringify(history));

  alert("Payment Successful 🎉");

  cart = [];
  total = 0;
  updateCart();
}

// ===== BACKEND READY API (for future) =====
async function fetchRecommendationFromBackend() {
  let res = await fetch("http://localhost:5000/recommend");
  let data = await res.json();
  return data.food;
}

</script>

</body>
</html>
